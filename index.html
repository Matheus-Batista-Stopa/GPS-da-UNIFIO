<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>GPS da UNIFIO</title>
</head>
<body>
    <main>
        <section id="secaoLogo">
            <h1 id="titulo">GPS da</h1>
            <img id="logo" src="./assets/UNIFIO.webp" alt="UNIFIO">
        </section>

        <form id="formBusca">
            <input id="ondeEsta" class="inputBuscar" type="text" placeholder="Digite onde você está" name="ondeEsta">
            <input id="ondeVai" class="inputBuscar" type="text" placeholder="Digite onde você quer ir" name="ondeVai">
            <button id="botaoBuscar" type="submit">Buscar</button>
        </form>

        <section id="mapaERota">
            <section id="secaoMapa">
                <h1>Mapa:</h1>
                <img id="mapaUnifio" src="./assets/Mapa UNIFIO.webp" alt="Mapa UNIFIO">
            </section>

            <section id="secaoRota">
                <h1>Detalhes da sua rota:</h1>
                <div id="detalhesRota"></div>
            </section>
        </section>
    </main>
</body>
</html>
